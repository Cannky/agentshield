# Created: 2026-03-29 00:00:00
# Damage Control Patterns - 3-tier path protection
# Source: IndyDevDan claude-code-damage-control (adapted)
# Used by: edit-tool-damage-control.sh, write-tool-damage-control.sh
# NOTE: damage-control hooks bypass hook profiles (always run, security-critical)

zeroAccessPaths:
  # ENV files (contain secrets - API keys, DB URLs, tokens)
  - ".env"
  - ".env.*"
  - "*.env"
  - "~/.ssh/"
  - "~/.gnupg/"
  - "~/.aws/"
  - "~/.config/gcloud/"
  - "~/.azure/"
  - "~/.kube/"
  - "~/.docker/"
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"
  - "*.tfstate"
  - "*.tfstate.backup"
  - "firebase-adminsdk*.json"
  - "serviceAccountKey.json"
  - "~/.netrc"
  - "~/.git-credentials"
  - "passwords.kdbx"
  - "credentials.json"
  - "~/.npmrc"
  - "~/.pypirc"
  - "~/.config/gh/"
  - "*.jks"
  - "*.keystore"
  - ".htpasswd"
  - "ALL_API_KEYS_MASTER*"
  - "~/.claude/settings.json"

readOnlyPaths:
  - "/etc/"
  - "/usr/"
  - "/bin/"
  - "/sbin/"
  - "~/.bashrc"
  - "~/.zshrc"
  - "~/.profile"
  - "~/.bash_history"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "poetry.lock"
  - "uv.lock"
  - "bun.lockb"
  - "go.sum"
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "Cargo.lock"
  - "Gemfile.lock"
  - "composer.lock"
  - "~/.zsh_history"

noDeletePaths:
  - "~/.claude/"
  - "CLAUDE.md"
  - "BRAIN.md"
  - ".git/"
  - ".gitignore"
  - "LICENSE"
  - "README.md"
  - ".github/"
  - "Dockerfile"
  - "docker-compose.yml"
  - "MEMORY.md"
  - "SKILL.md"
